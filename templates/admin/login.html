<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Admin Login | Mudhai Instrument Services
    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Login CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/admin/login.css') }}">

</head>

<body>

<!-- ===================================== -->
<!-- Animated Background -->
<!-- ===================================== -->

<div class="background">

    <span class="circle circle1"></span>

    <span class="circle circle2"></span>

    <span class="circle circle3"></span>

    <span class="circle circle4"></span>

</div>

<!-- ===================================== -->
<!-- Login Container -->
<!-- ===================================== -->

<section class="login-section">

    <div class="container">

        <div class="row justify-content-center align-items-center min-vh-100">

            <div class="col-xl-4 col-lg-5 col-md-7 col-sm-10">

                <div class="login-card">

                    <!-- Logo -->

                    <div class="login-header">

                        <div class="logo">

                            <i class="fa-solid fa-user-shield"></i>

                        </div>

                        <h2>

                            Admin Login

                        </h2>

                        <p>

                            Mudhai Instrument Services

                        </p>

                    </div>

                    <!-- Flash Messages -->

                    {% with messages = get_flashed_messages(with_categories=true) %}

                    {% if messages %}

                    {% for category, message in messages %}

                    <div class="alert alert-{{ category }}">

                        {{ message }}

                    </div>

                    {% endfor %}

                    {% endif %}

                    {% endwith %}

                    <!-- Login Form -->

                    <form
                        action="{{ url_for('admin_login') }}"
                        method="POST">

                        <div class="mb-4">

                            <label class="form-label">

                                Username

                            </label>

                            <div class="input-group">

                                <span class="input-group-text">

                                    <i class="fa-solid fa-user"></i>

                                </span>

                                <input
                                    type="text"
                                    name="username"
                                    class="form-control"
                                    placeholder="Enter Username"
                                    required>

                            </div>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Password

                            </label>

                            <div class="input-group">

                                <span class="input-group-text">

                                    <i class="fa-solid fa-lock"></i>

                                </span>

                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    class="form-control"
                                    placeholder="Enter Password"
                                    required>

                                <button
                                    class="btn btn-outline-light"
                                    type="button"
                                    id="togglePassword">

                                    <i class="fa-solid fa-eye"></i>

                                </button>

                            </div>

                        </div>
                        <div style="margin-top:20px;">
                            <button
                                type="submit"
                                style="
                                width:100%;
                                height:55px;
                                background:#00d4ff;
                                color:#000;
                                border:none;
                                border-radius:12px;
                                font-size:18px;
                                font-weight:700;">
                                Login
                            </button>
                        </div>
                        
                        <div class="text-center">

                            <a
                                href="{{ url_for('home') }}"
                                class="back-home">

                                <i class="fa-solid fa-arrow-left me-2"></i>

                                Back to Website

                            </a>

                        </div>

                    </form>

                    <div class="login-footer">

                        <p>

                            © {{ now.year if now else 2026 }}
                            Mudhai Instrument Services

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- ===================================== -->
<!-- Bootstrap -->
<!-- ===================================== -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ===================================== -->
<!-- GSAP -->
<!-- ===================================== -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>

window.addEventListener("load",()=>{

    document.querySelector(".login-card").style.opacity="1";

    document.querySelector(".login-card").style.visibility="visible";

});

</script>

<script>

document.addEventListener("DOMContentLoaded", () => {

    /* ==========================
       Password Toggle
    ========================== */

    const password =
        document.getElementById("password");

    const toggle =
        document.getElementById("togglePassword");

    if(toggle){

        toggle.addEventListener("click",()=>{

            const type =
                password.type === "password"
                ? "text"
                : "password";

            password.type = type;

            toggle.innerHTML =
                type === "password"

                ? '<i class="fa-solid fa-eye"></i>'

                : '<i class="fa-solid fa-eye-slash"></i>';

        });

    }

    /* ==========================
       GSAP Animation
    ========================== */

    if(typeof gsap !== "undefined"){

        gsap.from(".login-card",{

            opacity:0,
            y:60,
            scale:.9,
            duration:1,
            ease:"power3.out"

        });

        gsap.from(".logo",{

            opacity:0,
            rotation:360,
            duration:1.3,
            delay:.2

        });

        gsap.from(".form-label",{

            opacity:0,
            x:-20,
            stagger:.08,
            duration:.6,
            delay:.3

        });

        gsap.from(".input-group",{

            opacity:0,
            y:20,
            stagger:.12,
            duration:.7,
            delay:.4

        });

        gsap.from(".login-btn",{

            opacity:0,
            y:20,
            duration:.8,
            delay:.8

        });

    }

});

</script>

</body>

</html>
